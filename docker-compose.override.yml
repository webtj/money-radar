# Money Radar — Docker Compose Override
# Adds RSSHub to feeds.fun's existing docker-compose.yml
# Usage: docker compose --profile single-user up -d

services:

  rsshub:
    image: diygod/rsshub:latest
    restart: always
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: 300
      # Access key (optional, set to protect your RSSHub instance)
      # ACCESS_KEY: your-secret-key
    networks:
      - ffun_network
